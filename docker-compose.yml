version: '3.8'

services:
  kira:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - kira_data:/app/data
      - kira_uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  kira_data:
  kira_uploads:
  redis_data:
